  fail_on_repo_dirty_outside_allowlist: true
allowlist_paths:
- src/
- tests/
- scripts/
allowed_paths:
- src/
- tests/
- scripts/
expected_touched_max: 1
task_type: terminal_workflow
benchmark_track: core
forbidden_paths:
- docs/
