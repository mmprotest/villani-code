id: terminal_301_persistent_process_readiness_hang
family: terminal_workflow
difficulty: hard
language: python
max_minutes: 20
max_files_touched: 4
expected_artifacts:
- patch
visible_verification:
- pytest -q tests/test_visible_smoke.py::test_smoke_script_returns_healthy_status
hidden_verification:
- pytest -q
success_policy:
  require_visible_pass: true
  require_hidden_pass: true
